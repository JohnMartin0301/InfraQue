{% extends "base.html" %}

{% block title %}My Requests{% endblock %}

{% block content %}

<h2>My Requests</h2>

<ul>
{% for r in requests %}
    <li>
        <a href="{{ url_for('requests.request_detail', request_id=r.id) }}">
            {{ r.title }} - {{ r.status }} - {{ r.created_at }}
        </a>
    </li>
{% endfor %}
</ul>

{% endblock %}
