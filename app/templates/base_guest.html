<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InfraQue{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div style="position: absolute; top: 16px; left: 0; right: 0; display: flex; justify-content: center; z-index: 10;">
        <div style="display:flex; flex-direction:column; gap:8px; width: 100%; max-width: 380px;">
        {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        </div>
    </div>
    {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</body>
</html>
