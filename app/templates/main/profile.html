{% extends "base.html" %}

{% block title %}Profile — InfraQue{% endblock %}

{% block content %}

<div class="page-header">
    <div class="page-header-text">
        <h1>Profile</h1>
        <p>Your account details.</p>
    </div>
</div>

<div class="card" style="max-width: 480px;">
    <dl class="detail-grid">
        <dt>Username</dt>
        <dd>{{ user.username }}</dd>

        <dt>Email</dt>
        <dd>{{ user.email }}</dd>

        <dt>Role</dt>
        <dd><span class="role-badge">{{ user.role }}</span></dd>

        <dt>Member since</dt>
        <dd>{{ user.created_at.strftime("%Y-%m-%d") }}</dd>
    </dl>

    <hr>

    <a class="btn btn-secondary" href="{{ url_for('main.change_password') }}">Change password</a>
</div>

{% endblock %}
